### Variables

$mainMod = SUPER
$left = H
$down = J
$up = K
$right = L
$term = kitty
$menu = ~/.config/hypr/scripts/menu.sh
$fileManager = nautilus

### General
monitor = eDP-1, 1920x1080@120.00, 0x0, 1

env = NIXOS_OZONE_WL,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_PICTURES_DIR,/home/parv/Pictures
env = XDG_VIDEOS_DIR,/home/parv/Videos
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = __NV_PRIME_RENDER_OFFLOAD,1
env = __NV_PRIME_RENDER_OFFLOAD_PROVIDER,NVIDIA-G0
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0
env = __GL_SHADER_DISK_CACHE,1
env = __GL_SHADER_DISK_CACHE_PATH,/home/parv/.cache/nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia

exec-once = ~/.config/hypr/scripts/autostart.sh

general {
    border_size = 1
    gaps_in = 0
    gaps_out = 0
    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 30
    allow_tearing = false
    col.active_border = rgb(1e1e1e)
    col.inactive_border = rgb(1e1e1e)
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
        size = 3
        passes = 3
    }
}

animations {
    enabled = true
    bezier = soft, 0.16, 1, 0.3, 1
    animation = windows, 1, 3, soft, popin 90%
    animation = windowsOut, 1, 3, soft, popin 90%
    animation = fade, 1, 3, soft
    animation = layers, 1, 3, soft, fade
    animation = workspaces, 1, 3, soft, slide
    animation = border, 1, 3, soft
}

dwindle {
    preserve_split = true
}

misc {
    font_family = JetBrainsMono Nerd Font
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

input {
    kb_layout = eu
    follow_mouse = 1

    touchpad {
        disable_while_typing = true
        tap-to-click = true
        natural_scroll = true
        middle_button_emulation = true
    }
}

gesture = 3, horizontal, workspace

cursor {
    no_warps = true
}

### Window rules

windowrule {
    name = "swayimg_float"
    match:class = ^(swayimg)$
    float = on
    size = 800 600
}

### Key bindings

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, RETURN, exec, $term
bind = $mainMod SHIFT, RETURN, exec, $term
bind = $mainMod, Q, killactive
bind = $mainMod, C, killactive
bind = $mainMod, P, exec, $menu
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clipboard-menu.sh
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper-menu.sh
bind = $mainMod, X, exec, $term -e /usr/bin/fish -lc yazi
bind = $mainMod, Z, exec, ~/.config/hypr/scripts/lock.sh

bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod SHIFT, E, exit

# Screenshot
bindl = , Print, exec, ~/.config/hypr/scripts/screenshot.sh menu
bindl = , Sys_Req, exec, ~/.config/hypr/scripts/screenshot.sh menu
bindl = , code:107, exec, ~/.config/hypr/scripts/screenshot.sh menu
bindl = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh area-edit

# Media controls
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause

# Volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Moving around
bind = $mainMod, Up, exec, ~/.config/hypr/scripts/workspace-step.sh next
bind = $mainMod, Down, exec, ~/.config/hypr/scripts/workspace-step.sh prev
bind = $mainMod CTRL, Right, workspace, e+1
bind = $mainMod CTRL, Left, workspace, e-1
bind = $mainMod, Right, movefocus, r
bind = $mainMod, Left, movefocus, l

bind = $mainMod SHIFT, Tab, exec, ~/.config/hypr/scripts/focus_last_window.sh

bind = $mainMod, $left, movefocus, l
bind = $mainMod, $down, movefocus, d
bind = $mainMod, $up, movefocus, u
bind = $mainMod, $right, movefocus, r

bind = $mainMod SHIFT, $left, movewindow, l
bind = $mainMod SHIFT, $down, movewindow, d
bind = $mainMod SHIFT, $up, movewindow, u
bind = $mainMod SHIFT, $right, movewindow, r

# Workspaces
bind = $mainMod, Tab, workspace, previous

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Layout
bind = $mainMod, B, layoutmsg, preselect l
bind = $mainMod CTRL, V, layoutmsg, preselect d
bind = $mainMod, S, pseudo
bind = $mainMod, W, togglefloating
bind = $mainMod CTRL, E, togglesplit

bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, Space, togglefloating
bind = $mainMod CTRL, Space, cyclenext
bind = $mainMod, A, focuscurrentorlast
bind = $mainMod CTRL, C, focuscurrentorlast

# Scratchpad
bind = $mainMod SHIFT, minus, movetoworkspacesilent, special:scratch
bind = $mainMod, minus, togglespecialworkspace, scratch

# Resize
bind = $mainMod, R, submap, resize
submap = resize
binde = , $left, resizeactive, -10 0
binde = , $down, resizeactive, 0 10
binde = , $up, resizeactive, 0 -10
binde = , $right, resizeactive, 10 0
bind = , Escape, submap, reset
submap = reset
