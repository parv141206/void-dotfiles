# ============================================================
# Browser-like tmux config
# Windows = tabs
# Panes   = splits
# ============================================================

# Use Ctrl+a as tmux prefix instead of default Ctrl+b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config quickly
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Start windows and panes at 1, like browser tabs
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Better terminal colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse support
set -g mouse on

# Bigger history scrollback
set -g history-limit 50000

# Vi-style copy mode
setw -g mode-keys vi

# Faster escape timing
set -sg escape-time 10

# ============================================================
# Browser-like tab/window controls
# ============================================================

# Ctrl+t = new tab/window
bind -n C-t new-window

# Ctrl+w = close current tab/window
bind -n C-w kill-window

# Ctrl+Shift+T equivalent is hard in terminals, so use Alt+t
bind -n M-t new-window

# Ctrl+Tab / Ctrl+Shift+Tab
# NOTE: some terminals do not send these to tmux.
bind -n C-Tab next-window
bind -n C-S-Tab previous-window

# Alt+number = switch to tab/window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Alt+Left / Alt+Right = switch tabs
bind -n M-Left previous-window
bind -n M-Right next-window

# ============================================================
# Splits
# ============================================================

bind -n C-_ split-window -v -c "#{pane_current_path}"# Reliable alternatives:
bind -n C-\\ split-window -h -c "#{pane_current_path}"

bind -n C-_ split-window -v -c "#{pane_current_path}"
# Close current pane
bind -n C-q kill-pane

# ============================================================
# Pane movement
# ============================================================

# Alt+h/j/k/l = move between panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt+arrow = move between panes
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# Resize panes using Ctrl+Alt+h/j/k/l
bind -n C-M-h resize-pane -L 5
bind -n C-M-j resize-pane -D 3
bind -n C-M-k resize-pane -U 3
bind -n C-M-l resize-pane -R 5

# ============================================================
# Nice status bar
# ============================================================

set -g status-position bottom
set -g status-interval 2

set -g status-left-length 40
set -g status-right-length 80

set -g status-left " #[bold]#S "
set -g status-right " %H:%M  %d-%m-%Y "

setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold]#I:#W* "

set -g status-style "bg=default"
set -g window-status-current-style "bold"
# Allow terminal image protocols / escape passthrough
set -g allow-passthrough on

# Good terminal color/image compatibility
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",kitty:RGB"
